name: Build X86_64 OpenWrt (Optimized)

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  USE_CCACHE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@main

      # ---------- 磁盘空间释放（基础） ----------
      - name: Free disk space with maximize-build-space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          remove-packages: 'google-cloud-sdk google-chrome-stable firefox powershell microsoft-edge-stable mysql* azure-cli'

      # ---------- 额外手动清理大型目录 ----------
      - name: Additional disk cleanup
        run: |
          echo "Before additional cleanup:"
          df -hT
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/share/swift /usr/local/.ghcup \
                      /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules \
                      /usr/share/gradle-* /usr/share/apache-maven-* /usr/local/graalvm /opt/hostedtoolcache
          sudo docker system prune -a -f || true
          sudo apt clean
          sudo apt autoremove -y
          echo "After additional cleanup:"
          df -hT

      # ---------- 修复 dpkg ----------
      - name: Fix dpkg state
        run: |
          sudo dpkg --configure -a
          sudo apt-get install -f -y

      # ---------- 安装编译依赖（不安装推荐包） ----------
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends --fix-missing \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
            genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
            libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt autoremove -y
          sudo apt clean
          sudo timedatectl set-timezone "$TZ"

      # ---------- 缓存 ----------
      - name: Cache OpenWrt download
        uses: actions/cache@v4
        id: cache-dl
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-dl-

      - name: Cache ccache
        uses: actions/cache@v4
        if: env.USE_CCACHE == 'true'
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Clone source code
        run: git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && cp $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        working-directory: openwrt
        run: ./scripts/feeds update -a

      - name: Install feeds
        working-directory: openwrt
        run: ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && cp -r files openwrt/files
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Download package sources
        working-directory: openwrt
        run: |
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        id: compile
        working-directory: openwrt
        run: |
          if [ "$USE_CCACHE" = "true" ]; then
            export PATH="/usr/lib/ccache:$PATH"
            export CCACHE_DIR="$(pwd)/.ccache"
            ccache -s
          fi
          echo "Starting compilation with $(nproc) threads"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/')
          if [ -z "$DEVICE" ]; then
            DEVICE="x86_64"
          fi
          echo "DEVICE_NAME=_${DEVICE}" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: Check disk usage after build
        if: always()
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize firmware files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets
          TARGET_DIR=$(find . -type d -name "*" | grep -E 'x86|generic' | head -1)
          if [ -z "$TARGET_DIR" ]; then
            echo "Firmware directory not found!"
            exit 1
          fi
          cd $TARGET_DIR
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          TAG_NAME="$(date +'%Y.%m.%d-%H%M')"
          echo "release_tag=$TAG_NAME" >> $GITHUB_OUTPUT
          cat > release.txt <<EOF
          ## OpenWrt Firmware (${{ env.DEVICE_NAME }})
          - Build Date: $(date +'%Y-%m-%d %H:%M:%S %Z')
          - Source: ${{ env.REPO_URL }} (${{ env.REPO_BRANCH }})
          - Device: ${{ env.DEVICE_NAME }}
          - Files in this release:
          $(cd ${{ env.FIRMWARE }} && ls -lh)
          EOF
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete outdated workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 3

      - name: Remove old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
