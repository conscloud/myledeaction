name: Build X86_64 Version OpenWrt old

on:
  workflow_dispatch:
  repository_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
    - name: 显示初始磁盘空间
      run: |
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: 最大化可用磁盘空间
      uses: easimon/maximize-build-space@v10
      with: 
        root-reserve-mb: 2048
        swap-size-mb: 1
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        remove-docker-images: true

    - name: 再次显示剩余磁盘空间
      run: |
        echo "=============================================================================="
        df -hT
        echo "=============================================================================="

    - name: Checkout 源码
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 初始化编译环境
      run: |
        set -euxo pipefail
        sudo apt-get -qq update
        sudo apt-get -qq install -y --no-install-recommends \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo apt-get -qq autoremove --purge
        sudo apt-get -qq clean
        sudo timedatectl set-timezone "${TZ}"
        sudo chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE"

    - name: 缓存 dl 依赖包
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: dl-cache-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/.config') }}
        restore-keys: |
          dl-cache-${{ env.REPO_BRANCH }}-

    - name: 克隆 OpenWRT 源码
      run: |
        git clone --depth=1 "${REPO_URL}" -b "${REPO_BRANCH}" openwrt

    - name: 自定义feeds和DIY1脚本
      run: |
        set -euxo pipefail
        if [ -f "${FEEDS_CONF}" ]; then
          mv "${FEEDS_CONF}" openwrt/feeds.conf.default
        fi
        chmod +x "${DIY_P1_SH}"
        cd openwrt
        ../"${DIY_P1_SH}"

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载自定义配置和DIY2脚本
      run: |
        set -euxo pipefail
        if [ -d files ]; then
          mv files openwrt/files
        fi
        if [ -f "${CONFIG_FILE}" ]; then
          mv "${CONFIG_FILE}" openwrt/.config
        fi
        chmod +x "${DIY_P2_SH}"
        cd openwrt
        ../"${DIY_P2_SH}"

    - name: 下载软件包依赖
      run: |
        set -euxo pipefail
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        set -euxo pipefail
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        if [ -s DEVICE_NAME ]; then
          echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        fi
        echo "FILE_DATE=_$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 检查磁盘空间
      if: always()
      run: df -hT

    - name: 上传 bin 目录
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: 整理 firmware
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        set -euxo pipefail
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件文件夹
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 上传到 Cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true'
      run: |
        set -euxo pipefail
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress "${FIRMWARE}" 2>&1 | tee cowtransfer.log
        url=$(grep https cowtransfer.log | cut -f3 -d" ")
        echo "::warning file=cowtransfer.com::$url"
        echo "url=$url" >> $GITHUB_OUTPUT

    - name: 上传到 WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true'
      run: |
        set -euxo pipefail
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress "${FIRMWARE}" 2>&1 | tee wetransfer.log
        url=$(grep https wetransfer.log | cut -f3 -d" ")
        echo "::warning file=wetransfer.com::$url"
        echo "url=$url" >> $GITHUB_OUTPUT

    - name: 生成发布标签和说明
      id: tag
      if: env.UPLOAD_RELEASE == 'true'
      run: |
        set -euxo pipefail
        rel_tag=$(date +'%Y.%m.%d-%H%M')
        echo "release_tag=$rel_tag" >> $GITHUB_OUTPUT
        touch release.txt
        if [ "${UPLOAD_COWTRANSFER}" = "true" ] && [ -n "${{ steps.cowtransfer.outputs.url }}" ]; then
          echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        fi
        if [ "${UPLOAD_WETRANSFER}" = "true" ] && [ -n "${{ steps.wetransfer.outputs.url }}" ]; then
          echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布 Release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success'
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 删除旧的 Actions runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: 删除旧的 Release
      uses: dev-drprasad/delete-older-releases@v0.2.0
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
